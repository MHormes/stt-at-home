version: '3.8'

services:
  whisper-api:
    container_name: whisper-api
    image: ghcr.io/ggerganov/whisper.cpp:main
    entrypoint: ["/app/build/bin/whisper-server"]
    volumes:
      - ./models:/models
    command: ["-m", "/models/ggml-large-v3-turbo.bin", "--port", "8080"]
    restart: unless-stopped

  python-be:
    container_name: python-be
    build: ./backend
    environment:
      - WHISPER_URL=http://whisper-api:8080/inference
    depends_on:
      - whisper-api
    restart: unless-stopped

  nginx-fe:
    container_name: nginx-fe
    build: ./frontend
    ports:
      - "8443:443"
    volumes:
      - ssl-certs:/etc/nginx/ssl
    depends_on:
      - python-be
    restart: unless-stopped

volumes:
  ssl-certs:
